<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trynyty — Création de personnage</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <header>
        <h1>Trynyty <span class="sous-titre">Rémanence</span></h1>
    </header>

    <main>
        <section id="gestion-personnage" class="carte" hidden>
            <h2>Personnage en cours</h2>
            <p class="texte-info">Un personnage existe déjà dans ce navigateur. Modifie-le directement ci-dessous, ou choisis une action :</p>
            <div class="gestion-actions">
                <button id="bouton-sauvegarder">💾 Sauvegarder</button>
                <button id="bouton-charger">📂 Charger un JSON</button>
                <input type="file" id="fichier-charger" accept="application/json" hidden>
            </div>
            <div class="gestion-actions gestion-actions-danger">
                <button id="bouton-relancer-questionnaire">🔁 Relancer le questionnaire</button>
                <button id="bouton-relancer-libre">🔁 Relancer la création libre</button>
                <button id="bouton-reset-total">🗑️ Reset total</button>
            </div>
        </section>

        <nav id="onglets-methode" class="onglets">
            <button class="onglet actif" data-onglet="questionnaire">Questionnaire</button>
            <button class="onglet" data-onglet="creation-libre">Création libre</button>
        </nav>

        <div id="contenus-methode">
            <section class="onglet-contenu actif" id="onglet-questionnaire">
                <div class="entete-section">
                    <span id="questionnaire-progression">0 / 9</span>
                    <span id="questionnaire-resultat"></span>
                </div>
                <div id="questionnaire-conteneur"></div>
            </section>

            <section class="onglet-contenu" id="onglet-creation-libre">
                <h2>Affinité</h2>
                <div id="selecteur-affinite" class="affinite-groupe"></div>
            </section>
        </div>

        <section>
            <h2>Attributs x Vocations</h2>
            <div id="tableau-competences"></div>
        </section>

        <button id="bouton-terminer">Terminer et ouvrir ma fiche</button>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
